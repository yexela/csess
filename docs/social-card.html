<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:640px; }
  body {
    background: radial-gradient(1200px 600px at 78% -10%, #313244 0%, #1e1e2e 55%);
    color:#cdd6f4;
    font-family:"SF Mono","JetBrains Mono",Menlo,monospace;
    padding:74px 80px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .top { display:flex; align-items:baseline; gap:22px; }
  .prompt { color:#a6e3a1; font-size:46px; font-weight:700; }
  .word { font-size:104px; font-weight:800; letter-spacing:-2px; color:#f5f5f7; }
  .cursor { display:inline-block; width:26px; height:78px; background:#f38ba8;
            transform:translateY(10px); margin-left:6px; border-radius:3px; }
  .tag { font-size:34px; color:#bac2de; margin-top:26px; line-height:1.35; max-width:1000px; }
  .accent { color:#89b4fa; }
  .chips { display:flex; flex-wrap:wrap; gap:16px; margin-top:8px; }
  .chip { font-size:26px; background:#313244; color:#cdd6f4; padding:12px 22px;
          border-radius:999px; border:1px solid #45475a; }
  .foot { display:flex; align-items:center; justify-content:space-between; }
  .repo { font-size:30px; color:#9399b2; }
  .repo b { color:#cdd6f4; }
  .badge { font-size:24px; color:#1e1e2e; background:#a6e3a1; padding:10px 20px;
           border-radius:10px; font-weight:700; }
</style>
</head>
<body>
  <div class="top">
    <span class="prompt">&gt;</span>
    <span class="word">csess</span>
    <span class="cursor"></span>
  </div>

  <div>
    <div class="tag">A searchable, portable store for your <span class="accent">Claude&nbsp;Code</span> sessions.<br>Find any past session by content, tag, or fuzzy search — and resume it in <span class="accent">any folder</span>.</div>
    <div class="chips" style="margin-top:34px;">
      <span class="chip">🔎 full-text search</span>
      <span class="chip">🏷️ tags</span>
      <span class="chip">🤖 AI titles</span>
      <span class="chip">🎯 fuzzy find</span>
      <span class="chip">🔁 resume anywhere</span>
    </div>
  </div>

  <div class="foot">
    <div class="repo">github.com/<b>yexela/csess</b></div>
    <div class="badge">local-first · Postgres</div>
  </div>
</body>
</html>
